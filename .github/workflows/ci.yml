name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore apps/api/Utilix.Api/Utilix.Api.csproj

      - name: Build API
        run: dotnet build apps/api/Utilix.Api/Utilix.Api.csproj -c Release --no-restore

      - name: Run API tests
        run: dotnet test apps/api/Utilix.Tests/Utilix.Tests.csproj -c Release --no-build --verbosity normal

  web-lint-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd apps/web && npm ci

      - name: Lint
        run: cd apps/web && npm run lint --if-present

      - name: Build
        run: cd apps/web && npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [api-tests, web-lint-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          tags: utilix-api:latest
          push: false

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          tags: utilix-web:latest
          push: false
